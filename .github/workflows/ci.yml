name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run test suite
        shell: bash
        run: node --test hooks/*.test.js scripts/*.test.js
      - name: Token report smoke test
        shell: bash
        run: node scripts/token-report.js --json
      - name: Version consistency
        shell: bash
        run: |
          plugin=$(node -p "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8')).version")
          market=$(node -p "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8')).plugins[0].version")
          if [ "$plugin" != "$market" ]; then
            echo "version mismatch: plugin.json=$plugin marketplace.json=$market"
            exit 1
          fi
